<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Digital Product Recommendation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 650px; text-align: center; }
        #inputSection h1 { font-size: 24px; color: #333; margin-bottom: 10px; }
        #inputSection p { color: #666; font-size: 14px; margin-bottom: 30px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #e1e4e8; border-radius: 12px; font-size: 16px; resize: none; box-sizing: border-box; }
        button.primary-btn { background-color: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s ease; }
        button.primary-btn:hover { background-color: #0056b3; }
        #leaderboardSection, #compareSection { display: none; text-align: left; }
        .leaderboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;}
        .leaderboard-header h2 { margin: 0; color: #333; font-size: 22px; }
        .btn-back { background: none; border: none; color: #007bff; cursor: pointer; font-size: 14px; font-weight: bold; }
        .product-card { display: flex; align-items: center; justify-content: space-between; background-color: #fff; border: 1px solid #e1e4e8; border-radius: 12px; padding: 15px; margin-bottom: 15px; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .rank-badge { font-size: 20px; font-weight: bold; color: #adb5bd; width: 30px;}
        .product-info { flex-grow: 1; padding: 0 15px; }
        .product-name { font-size: 18px; font-weight: bold; color: #333; margin: 0 0 5px 0; }
        .product-specs { font-size: 13px; color: #666; margin: 0 0 5px 0; }
        .product-reason { font-size: 12px; font-style: italic; color: #888; margin: 0; } /* US-04 */
        .match-score { background-color: #e6f4ea; color: #28a745; padding: 8px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; text-align: center; }
        #loader { display: none; color: #007bff; font-weight: bold; margin-top: 20px; text-align: center; }
        /* US-05 Compare Styles */
        .compare-checkbox { transform: scale(1.5); margin-right: 10px; cursor: pointer; }
        #compareBtn { background-color: #28a745; margin-top: 10px; display: none; }
        #compareBtn:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 14px; }
        th { background-color: #f8f9fa; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Input Section -->
        <div id="inputSection">
            <h1>Find My Perfect Device</h1>
            <p>Describe what you need in plain English. We will match the Top 5 products for you.</p>
            <textarea id="userInput" placeholder="e.g., I need a high-performance laptop for 3D modeling under $2000, no Apple..."></textarea>
            <button id="submitBtn" class="primary-btn">Find My Device</button>
            <div id="loader">🔄 Analyzing your request and fetching data...</div>
        </div>

        <!-- Leaderboard Section -->
        <div id="leaderboardSection">
            <div class="leaderboard-header">
                <h2>🏆 Top 5 Recommendations</h2>
                <button class="btn-back" onclick="location.reload()">← Start Over</button>
            </div>
            <div id="productList"></div>
            <!-- US-05 Compare Button -->
            <button id="compareBtn" class="primary-btn">⚖️ Compare Selected Specs</button>
        </div>

        <!-- US-05 Compare Section -->
        <div id="compareSection">
            <div class="leaderboard-header">
                <h2>⚖️ Spec Comparison</h2>
                <button class="btn-back" onclick="backToLeaderboard()">← Back to Leaderboard</button>
            </div>
            <div id="compareTableContainer"></div>
        </div>
    </div>

    <script>
        const inputSection = document.getElementById('inputSection');
        const leaderboardSection = document.getElementById('leaderboardSection');
        const compareSection = document.getElementById('compareSection');
        const submitBtn = document.getElementById('submitBtn');
        const compareBtn = document.getElementById('compareBtn');
        const userInput = document.getElementById('userInput');
        const loader = document.getElementById('loader');
        const productList = document.getElementById('productList');
        const compareTableContainer = document.getElementById('compareTableContainer');

        const mockRecommendations = [
            { id: 1, name: "ASUS Zenbook 14", specs: "Intel Core Ultra 9 · 32GB RAM · 1TB SSD", price: "$1400", match: "98%", reason: "Matches category: Laptops; within budget; high customer satisfaction." },
            { id: 2, name: "MacBook Pro 14", specs: "M3 Pro chip · 18GB RAM · 512GB SSD", price: "$1999", match: "92%", reason: "Matches brand preference; premium build quality." },
            { id: 3, name: "Dell XPS 14", specs: "Intel Core Ultra 7 · 16GB RAM · 512GB SSD", price: "$1699", match: "85%", reason: "Strong purchase frequency and positive intent." },
            { id: 4, name: "Lenovo ThinkPad X1", specs: "Intel Core Ultra 7 · 32GB RAM · 1TB SSD", price: "$1850", match: "80%", reason: "General product match based on price ratio." },
            { id: 5, name: "HP Spectre x360", specs: "Intel Core Ultra 7 · 16GB RAM · 1TB SSD", price: "$1550", match: "75%", reason: "Matches battery life requirements." }
        ];

        let selectedForCompare = [];

        submitBtn.addEventListener('click', function() {
            if (userInput.value.trim() === "") return alert("Please enter your requirements!");
            
            submitBtn.style.display = 'none';
            loader.style.display = 'block';

            setTimeout(() => {
                renderLeaderboard(mockRecommendations);
                inputSection.style.display = 'none';
                loader.style.display = 'none';
                leaderboardSection.style.display = 'block';
            }, 1000);
        });

        function renderLeaderboard(data) {
            productList.innerHTML = ""; 
            selectedForCompare = [];
            compareBtn.style.display = 'none';

            data.forEach((product, index) => {
                let rankIcon = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `#${index + 1}`;
                const card = document.createElement('div');
                card.className = 'product-card';
                // US-04: Added reason rendering
                // US-05: Added checkbox for comparison
                card.innerHTML = `
                    <input type="checkbox" class="compare-checkbox" value="${product.id}" onchange="handleCompareSelect(this)">
                    <div class="rank-badge">${rankIcon}</div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-specs">${product.specs} | <b>${product.price}</b></p>
                        <p class="product-reason">💡 ${product.reason}</p> 
                    </div>
                    <div class="match-score">${product.match} Match</div>
                `;
                productList.appendChild(card);
            });
        }

        function handleCompareSelect(checkbox) {
            if (checkbox.checked) {
                if (selectedForCompare.length >= 3) {
                    alert("You can only compare up to 3 products!");
                    checkbox.checked = false;
                    return;
                }
                selectedForCompare.push(checkbox.value);
            } else {
                selectedForCompare = selectedForCompare.filter(id => id !== checkbox.value);
            }
            compareBtn.style.display = selectedForCompare.length > 1 ? 'block' : 'none';
        }

        compareBtn.addEventListener('click', function() {
            leaderboardSection.style.display = 'none';
            compareSection.style.display = 'block';
            
            const items = mockRecommendations.filter(p => selectedForCompare.includes(p.id.toString()));
            
            let tableHTML = `<table><tr><th>Feature</th>`;
            items.forEach(p => tableHTML += `<th>${p.name}</th>`);
            tableHTML += `</tr><tr><td><b>Price</b></td>`;
            items.forEach(p => tableHTML += `<td>${p.price}</td>`);
            tableHTML += `</tr><tr><td><b>Core Specs</b></td>`;
            items.forEach(p => tableHTML += `<td>${p.specs.split(' · ').join('<br>')}</td>`);
            tableHTML += `</tr><tr><td><b>Match Score</b></td>`;
            items.forEach(p => tableHTML += `<td><span class="match-score">${p.match}</span></td>`);
            tableHTML += `</tr></table>`;
            
            compareTableContainer.innerHTML = tableHTML;
        });

        function backToLeaderboard() {
            compareSection.style.display = 'none';
            leaderboardSection.style.display = 'block';
        }
    </script>
</body>
</html>
